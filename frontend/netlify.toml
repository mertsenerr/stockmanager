[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist/frontend/browser"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers. Backend already sets CSP / X-Frame / HSTS on JSON responses
# but Netlify serves the HTML shell that loads Angular, so the same defences
# need to ride on those responses too. Without them the SPA host is the soft
# target (clickjacking, CSP-less script injection if a CDN ever leaks).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(self), camera=(self), payment=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # The boot script in index.html reads localStorage and applies the theme
    # before Angular mounts — that's inline, so 'unsafe-inline' is required
    # for script-src. Tighten with a nonce/hash if/when the inline boot is
    # moved into the bundle.
    # connect-src lists every origin the SPA talks to (API + WebSocket + Turnstile).
    # frame-src is needed because Turnstile renders a challenge in an iframe.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://stockmanager-d6nm.onrender.com wss://stockmanager-d6nm.onrender.com https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# Long-cache the hashed bundle assets; index.html stays no-cache so deploys
# are picked up immediately.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
