<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>syncompare</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Canlı, çok kullanıcılı sayım karşılaştırma platformu.">
  <meta name="color-scheme" content="dark light">
  <link rel="icon" type="image/png" href="assets/images/logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap">

  <script>
    // Read theme preference and apply it before Angular boots — eliminates flash.
    (function () {
      var saved;
      try { saved = localStorage.getItem('syncompare.theme'); } catch (e) {}
      var theme = saved === 'light' || saved === 'dark' ? saved : 'dark';
      var html = document.documentElement;
      html.dataset.theme = theme;
      if (theme === 'dark') html.classList.add('dark');
      html.style.backgroundColor = theme === 'dark' ? '#0a0a0a' : '#faf5e8';
    })();
  </script>
</head>
<body class="bg-bg text-text-primary">
  <app-root></app-root>
</body>
</html>
